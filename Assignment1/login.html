<!DOCTYPE html>
<html>
<head>
<title>ABES Login</title>
<style>
body{font-family:Arial;background:#eef2f7;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:30px;border-radius:10px;box-shadow:0 0 10px gray;text-align:center;width:300px;}
input,button{width:100%;padding:10px;margin:10px 0;}
button{background:#002b5c;color:white;border:none;}
</style>
</head>

<body>
<div class="box">
<h2>ABES Login</h2>

<form onsubmit="return loginUser()">
<input id="user" type="text" placeholder="Username" required>
<input id="pass" type="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<p>New user? <a href="registration.html">Register</a></p>
</div>

<script>
function loginUser(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="admin" && p=="1234"){
alert("Login Success");
window.location="catalogue.html";
return false;
}
else{
alert("Invalid Login");
return false;
}
}
</script>
</body>
</html>
