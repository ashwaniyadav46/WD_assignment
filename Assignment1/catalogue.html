<!DOCTYPE html>
<html>
<head>
    <title>Catalogue</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            background: white;
            width: 220px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: blue;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

<h1>Product Catalogue 🛍️</h1>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Laptop</h3>
        <p class="price">₹50,000</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Mobile</h3>
        <p class="price">₹20,000</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Headphones</h3>
        <p class="price">₹2,000</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Shoes</h3>
        <p class="price">₹3,000</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
